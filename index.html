<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Travel Expense Splitter</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">

        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex justify-between items-center h-16">

                <div class="flex items-center space-x-3">

                    <div class="w-10 h-10 icon-bg rounded-lg flex items-center justify-center">
                        <span class="text-white text-xl">✈️</span>
                    </div>

                    <h1 class="text-xl font-semibold text-gray-900">
                        Travel Expense Splitter
                    </h1>

                </div>

                <button id="homeBtn"
                    class="text-blue-600 hover:text-blue-800 font-medium">

                    Home

                </button>

            </div>

        </div>

    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Homepage -->
        <div id="homepage" class="screen">

            <div class="text-center mb-12">

                <div class="w-20 h-20 icon-bg rounded-full flex items-center justify-center mx-auto mb-6">
                    <span class="text-white text-3xl">💰</span>
                </div>

                <h2 class="text-4xl font-bold text-gray-900 mb-4">
                    Travel Expense Splitter
                </h2>

                <p class="text-xl text-gray-600 max-w-2xl mx-auto">
                    Split travel expenses fairly among your group.
                    Track who paid what and settle up easily.
                </p>

            </div>

            <div class="grid md:grid-cols-2 gap-6 max-w-2xl mx-auto">

                <button id="createTripBtn"
                    class="card-shadow bg-white rounded-xl p-8 text-center hover:bg-blue-50 transition-all duration-300 group">

                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-200">
                        <span class="text-2xl">➕</span>
                    </div>

                    <h3 class="text-xl font-semibold text-gray-900 mb-2">
                        Create New Trip
                    </h3>

                    <p class="text-gray-600">
                        Start a new expense tracking session
                    </p>

                </button>

                <button id="viewTripsBtn"
                    class="card-shadow bg-white rounded-xl p-8 text-center hover:bg-green-50 transition-all duration-300 group">

                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-green-200">
                        <span class="text-2xl">📂</span>
                    </div>

                    <h3 class="text-xl font-semibold text-gray-900 mb-2">
                        View Existing Trip
                    </h3>

                    <p class="text-gray-600">
                        Continue working on saved trips
                    </p>

                </button>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
